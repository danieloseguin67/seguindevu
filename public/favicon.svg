<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#1565C0"/>

  <!-- Graduation cap: brim (diamond/rhombus shape) -->
  <polygon points="50,22 84,40 50,58 16,40" fill="#FFFFFF"/>

  <!-- Cap top (flat square top part) -->
  <polygon points="50,22 66,30 50,38 34,30" fill="#E3F2FD"/>

  <!-- Tassel cord -->
  <line x1="84" y1="40" x2="84" y2="60" stroke="#FFD600" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="84" cy="63" r="4" fill="#FFD600"/>

  <!-- Gown collar (arc below cap) -->
  <path d="M30,52 Q30,74 50,76 Q70,74 70,52 L70,44 L50,53 L30,44 Z" fill="#FFFFFF"/>
</svg>
